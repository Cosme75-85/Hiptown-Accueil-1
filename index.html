<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="Hiptown — Accueil visiteurs"/>
  <title>Hiptown — Accueil</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <header>
    <h1>Hiptown</h1>
    <p>Espace de coworking — Accueil visiteurs</p>
  </header>

  <main class="container">

    <!-- ÉTAPE 1 : sélection de la personne -->
    <section id="step-list">
      <p class="step-title">Qui souhaitez-vous voir ?</p>
      <div class="people-grid" id="people-grid"></div>
    </section>

    <!-- ÉTAPE 2 : formulaire visiteur -->
    <section id="step-form" hidden>
      <button class="back-btn" id="back-btn" aria-label="Retour à la liste">← Retour</button>

      <div class="selected-card">
        <div class="sel-avatar" id="sel-avatar"></div>
        <div>
          <div class="sel-name" id="sel-name"></div>
          <div class="sel-role" id="sel-role"></div>
        </div>
      </div>

      <label for="visitor-name">Votre nom <span aria-hidden="true">*</span></label>
      <input type="text" id="visitor-name" placeholder="Ex : Marie Dupont" autocomplete="name" required/>

      <label for="visitor-msg">Message (optionnel)</label>
      <input type="text" id="visitor-msg" placeholder="Ex : J'ai un rendez-vous à 14h"/>

      <button class="send-btn" id="send-btn">Prévenir de mon arrivée</button>
    </section>

    <!-- ÉTAPE 3 : confirmation -->
    <section id="step-success" hidden>
      <div class="check-circle" aria-hidden="true">✓</div>
      <h2>Message envoyé !</h2>
      <p id="success-text"></p>
      <button class="reset-btn" id="reset-btn">Retour à l'accueil</button>
    </section>

  </main>

  <footer>
    <p>Hiptown &copy; <span id="year"></span></p>
  </footer>

  <script src="config.js"></script>
<script src="app.js"></script>
</body>
</html>
